<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button-Exercises</title>
    <link rel="stylesheet" href="Button_exersises.css" />
  </head>
  <body>
    <a href="">Back to Amazon</a>
    <h1>Nike Black Running Shoes</h1>
    <h2>$39 - in stock</h2>
    <p>Free delivery tomorrow.</p>
    <button class="addtocart-button">Add to Cart</button>
    <button class="buynow-button">Buy now</button><br />

    <div>
      <button class="back_button">Back</button>
      <a href="#">1</a>
      <a href="#">2</a>
      <a href="#">3</a>
      <a href="#">4</a>
      <a href="#">5</a>
      <button class="next_button">Next</button>
    </div>
    <div>
      <button class="stretch_button">Stretch</button>
    </div>
    <div>
      <button class="shadow_button">Shadow</button>
    </div>
    <div>
      <button class="ott_button">One</button>
      <button class="ott_button">Two</button>
      <button class="ott_button">Three</button>
    </div>
  </body>
</html>
